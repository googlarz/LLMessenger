name: LLMessenger
options:
  bundleIdPrefix: com.llmessenger
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"
targets:
  LLMessenger:
    type: application
    platform: macOS
    sources:
      - path: LLMessenger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.llmessenger.app
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: LLMessenger/Info.plist
        CODE_SIGN_ENTITLEMENTS: LLMessenger/LLMessenger.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # FoundationModels only exists on macOS 26+; weak-link so the app
        # still launches on the 14.0 deployment target.
        OTHER_LDFLAGS: ["-weak_framework", "FoundationModels"]
    dependencies:
      - package: GRDB
      - target: LLMessengerWidget
        embed: true
      - sdk: EventKit.framework
  LLMessengerWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: LLMessengerWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.llmessenger.app.widget
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: LLMessengerWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: LLMessengerWidget/LLMessengerWidget.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: "-"
  LLMessengerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: LLMessengerTests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: LLMessenger
      - package: GRDB
schemes:
  LLMessenger:
    build:
      targets:
        LLMessenger: all
        LLMessengerWidget: all
        LLMessengerTests: [testing]
    test:
      targets:
        - LLMessengerTests
      environmentVariables:
        - variable: OS_ACTIVITY_MODE
          value: disable
          isEnabled: true
